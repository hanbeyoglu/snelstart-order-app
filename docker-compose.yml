services:
  mongodb:
    image: mongo:7
    container_name: snelstart-mongodb
    volumes:
      - mongodb_data:/data/db
    networks:
      - snelstart-network

  redis:
    image: redis:7-alpine
    container_name: snelstart-redis
    networks:
      - snelstart-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: snelstart-api
    ports:
      - "8081:3001"
    env_file:
      - .env
    depends_on:
      - mongodb
      - redis
    networks:
      - snelstart-network

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: snelstart-worker
    env_file:
      - .env
    depends_on:
      - mongodb
      - redis
    networks:
      - snelstart-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: snelstart-web
    ports:
      - "8082:80"
    environment:
      VITE_API_URL: https://order.dhyfoodbv.com
    depends_on:
      - api
    networks:
      - snelstart-network

volumes:
  mongodb_data:
  caddy_data:
  caddy_config:

networks:
  snelstart-network:
    driver: bridge
